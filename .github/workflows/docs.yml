name: Deploy Docs

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Build Sphinx docs
        run: uv run --extra docs sphinx-build -b html docs docs/_build/html
        env:
          DOCS_BRANCH: ${{ github.ref_name }}

      - name: Stash build output
        run: cp -a docs/_build/html /tmp/docs-build

      - name: Deploy to gh-pages
        run: |
          git checkout -- . && git clean -fd
          git fetch origin gh-pages:gh-pages 2>/dev/null && git checkout gh-pages || {
            git checkout --orphan gh-pages
            git rm -rf .
          }

          if [ "${{ github.ref_name }}" = "main" ]; then
            find . -maxdepth 1 ! -name dev ! -name .git ! -name . ! -name .nojekyll -exec rm -rf {} +
            cp -a /tmp/docs-build/. .
          else
            rm -rf dev
            cp -a /tmp/docs-build dev
          fi

          touch .nojekyll

          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Deploy docs from ${{ github.ref_name }} (${{ github.sha }})"
          git push origin gh-pages
